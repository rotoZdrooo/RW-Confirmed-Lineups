name: Morning Scout

on:
  repository_dispatch:
    types: [check-gameday]
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Check for EPL games today
        env:
          ROTOWIRE_KEY: ${{ secrets.ROTOWIRE_KEY }}
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
          CRONJOB_POLLER_ID: ${{ secrets.CRONJOB_POLLER_ID }}
        run: |
          XML=$(curl -sf "https://api.rotowire.com/Soccer/EPL/Lineups.php?key=$ROTOWIRE_KEY")
          if [ -z "$XML" ]; then
            echo "Failed to fetch lineups XML"
            exit 1
          fi

          TODAY_UTC=$(date -u +%Y-%m-%d)
          GAME_DATES=$(echo "$XML" | grep -oP 'Date="\K[^"]+' || true)

          FOUND=false
          for D in $GAME_DATES; do
            GAME_DAY=$(echo "$D" | cut -dT -f1)
            if [ "$GAME_DAY" = "$TODAY_UTC" ]; then
              FOUND=true
              break
            fi
          done

          if [ "$FOUND" = true ]; then
            echo "Game today -- enabling the lineup poller."
            curl -sf -X PATCH "https://api.cron-job.org/jobs/$CRONJOB_POLLER_ID" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $CRONJOB_API_KEY" \
              -d '{"job":{"enabled":true}}'
          else
            echo "No games today -- poller stays off."
          fi
